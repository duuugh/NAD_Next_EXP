<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WORKLOG2.0 研究汇报看板</title>
  <script src="https://cdn.plot.ly/plotly-2.26.0.min.js"></script>
  <style>
    :root {
      --bg: #f6f8fc;
      --card: #ffffff;
      --text: #162033;
      --muted: #6b7280;
      --accent: #4f46e5;
      --good: #059669;
      --warn: #d97706;
      --bad: #dc2626;
      --border: #e5e7eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: var(--bg);
    }
    .wrap { max-width: 1280px; margin: 0 auto; padding: 20px; }
    .hero {
      background: linear-gradient(120deg, #4338ca 0%, #7c3aed 60%, #0ea5e9 100%);
      color: #fff;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 18px;
    }
    .hero h1 { margin: 0 0 8px 0; font-size: 28px; }
    .hero p { margin: 4px 0; opacity: 0.95; }
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin: 14px 0 20px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 3px 10px rgba(20,30,60,.04);
    }
    .kpi-label { font-size: 12px; color: var(--muted); }
    .kpi-value { font-size: 22px; font-weight: 700; margin-top: 6px; }
    .kpi-value.good { color: var(--good); }
    .kpi-value.warn { color: var(--warn); }
    .kpi-value.bad { color: var(--bad); }
    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 14px 0 10px;
    }
    .section-title h2 { font-size: 20px; margin: 0; }
    .timeline { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 10px; }
    .timeline-item { border-left: 4px solid var(--border); }
    .timeline-item.best { border-left-color: var(--good); }
    .timeline-item.failed { border-left-color: var(--bad); }
    .timeline-item.neutral { border-left-color: var(--warn); }
    .timeline-item h3 { margin: 0 0 6px; font-size: 16px; }
    .timeline-meta { color: var(--muted); font-size: 12px; margin-bottom: 6px; }
    .controls { display: flex; gap: 16px; align-items: center; color: var(--muted); font-size: 14px; }
    .chart { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 10px; }
    #rankingChart, #schemeChart, #changeChart { width: 100%; height: 360px; }
    .split { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .cases { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .img-box img { width: 100%; border-radius: 10px; border: 1px solid var(--border); background: #fff; }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 12px; font-weight: 600; }
    .pill.good { background: #dcfce7; color: #166534; }
    .pill.warn { background: #fef3c7; color: #92400e; }
    .pill.bad { background: #fee2e2; color: #991b1b; }
    .decision li { margin: 6px 0; }
    @media (max-width: 900px) {
      .split, .cases { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <h1 id="title">研究汇报</h1>
    <p id="recMethod"></p>
    <p id="recWhy"></p>
    <p id="updatedAt"></p>
  </div>

  <div class="kpi-grid">
    <div class="card"><div class="kpi-label">当前主推方案</div><div id="kpiBest" class="kpi-value good">-</div></div>
    <div class="card"><div class="kpi-label">A1 单 cache</div><div id="kpiA1" class="kpi-value bad">-</div></div>
    <div class="card"><div class="kpi-label">Version A 单 cache</div><div id="kpiVA" class="kpi-value warn">-</div></div>
    <div class="card"><div class="kpi-label">mixed_v3 外部反馈</div><div class="kpi-value bad">平均排名下降</div></div>
  </div>

  <div class="section-title"><h2>实验时间线（突出主线）</h2></div>
  <div id="timeline" class="timeline"></div>

  <div class="section-title">
    <h2>方案对比</h2>
    <div class="controls">
      <label><input type="checkbox" id="focusBetter" checked> 只显示推荐/参考方案</label>
    </div>
  </div>
  <div class="split">
    <div class="chart"><div id="schemeChart"></div></div>
    <div class="chart"><div id="rankingChart"></div></div>
  </div>

  <div class="section-title"><h2>改动规模对比（越小越稳）</h2></div>
  <div class="chart"><div id="changeChart"></div></div>

  <div class="section-title"><h2>案例查看（activation 图）</h2></div>
  <div class="cases">
    <div class="card">
      <label for="caseSelect">题号：</label>
      <select id="caseSelect"></select>
      <p id="caseNote" style="margin-top:10px;color:#374151;"></p>
    </div>
    <div class="card img-box"><img id="caseImg" alt="activation case"/></div>
  </div>

  <div class="section-title"><h2>结论与下一步</h2></div>
  <div class="card">
    <ul id="decisionList" class="decision"></ul>
  </div>
</div>

<script>
let reportData = null;

function statusToClass(status) {
  if (status === 'best') return 'good';
  if (status === 'failed') return 'bad';
  return 'warn';
}

function renderHeader(data) {
  document.getElementById('title').textContent = data.title;
  document.getElementById('recMethod').textContent = `主推：${data.current_recommendation.method}`;
  document.getElementById('recWhy').textContent = `原因：${data.current_recommendation.why}`;
  document.getElementById('updatedAt').textContent = `WORKLOG 更新时间：${data.last_updated}`;
}

function renderTimeline(timeline) {
  const box = document.getElementById('timeline');
  box.innerHTML = '';
  timeline.forEach(item => {
    const cls = item.status === 'best' ? 'best' : item.status === 'failed' ? 'failed' : 'neutral';
    const el = document.createElement('div');
    el.className = `card timeline-item ${cls}`;
    el.innerHTML = `
      <div class="timeline-meta">${item.period}</div>
      <h3>${item.title}</h3>
      <div>焦点：${item.focus}</div>
      <div style="margin-top:6px;"><span class="pill ${statusToClass(item.status)}">${item.result}</span></div>
    `;
    box.appendChild(el);
  });
}

function renderSchemeChart(schemes, focusBetter = true) {
  const filtered = focusBetter
    ? schemes.filter(s => ['recommended', 'reference'].includes(s.status))
    : schemes;

  const x = filtered.map(s => s.display_name);
  const y = filtered.map(s => s.local_accuracy ?? null);
  const text = filtered.map(s => s.summary);
  const colors = filtered.map(s => {
    if (s.status === 'recommended') return '#059669';
    if (s.status === 'reference') return '#4f46e5';
    if (s.status === 'neutral') return '#d97706';
    return '#dc2626';
  });

  Plotly.newPlot('schemeChart', [{
    type: 'bar', x, y, marker: { color: colors }, text, hovertemplate: '%{x}<br>本地准确率: %{y}<br>%{text}<extra></extra>'
  }], {
    title: '方案本地表现（无数值代表以外部反馈为主）',
    yaxis: { title: 'Accuracy (%)' },
    margin: { t: 45, l: 55, r: 20, b: 80 }
  }, {displayModeBar: false});
}

function renderRankingChart(rows) {
  const top = rows.slice(0, 6);
  Plotly.newPlot('rankingChart', [{
    type: 'bar',
    x: top.map(r => r.selector),
    y: top.map(r => r.micro_accuracy),
    marker: { color: top.map(r => r.rank <= 3 ? '#2563eb' : '#94a3b8') },
    hovertemplate: 'selector=%{x}<br>micro acc=%{y}%<extra></extra>'
  }], {
    title: 'Selector 排名（Top 6）',
    yaxis: { title: 'Micro Accuracy (%)' },
    margin: { t: 45, l: 55, r: 20, b: 70 }
  }, {displayModeBar: false});
}

function renderChangeChart(scan) {
  const caches = scan.mixed_v2.map(r => r.cache_key);
  const v2 = scan.mixed_v2.map(r => r.changed_count);
  const v3 = scan.mixed_v3.map(r => r.changed_count);

  Plotly.newPlot('changeChart', [
    { type: 'bar', name: 'mixed_v2', x: caches, y: v2, marker: { color: '#4f46e5' } },
    { type: 'bar', name: 'mixed_v3', x: caches, y: v3, marker: { color: '#0ea5e9' } }
  ], {
    barmode: 'group',
    title: '核心 cache 改动题数',
    yaxis: { title: 'Changed problem count' },
    margin: { t: 45, l: 55, r: 20, b: 90 }
  }, {displayModeBar: false});
}

function renderCases(cases) {
  const sel = document.getElementById('caseSelect');
  const note = document.getElementById('caseNote');
  const img = document.getElementById('caseImg');
  sel.innerHTML = '';

  cases.forEach((c, idx) => {
    const op = document.createElement('option');
    op.value = idx;
    op.textContent = `Problem ${c.problem_id}`;
    sel.appendChild(op);
  });

  function showCase(i) {
    const c = cases[i];
    note.textContent = c.note;
    img.src = `{{ base_url }}/api/research_image/${c.image}`;
  }

  sel.addEventListener('change', () => showCase(parseInt(sel.value, 10)));
  showCase(0);
}

function renderDecision(data) {
  const list = document.getElementById('decisionList');
  list.innerHTML = '';
  [
    `优先继续：${data.current_recommendation.method}`,
    'activation 信号目前用于解释与辅助，不作为主 tie-break。',
    '下一轮实验坚持 very small、可归因、可回滚。',
    `建议推进：${data.current_recommendation.next_step}`
  ].forEach(t => {
    const li = document.createElement('li');
    li.textContent = t;
    list.appendChild(li);
  });
}

async function main() {
  const res = await fetch('{{ base_url }}/api/research_report_data');
  reportData = await res.json();

  renderHeader(reportData);
  renderTimeline(reportData.timeline);
  renderSchemeChart(reportData.schemes, true);
  renderRankingChart(reportData.selector_rankings || []);
  renderChangeChart(reportData.changed_scan);
  renderCases(reportData.case_studies || []);
  renderDecision(reportData);

  const a1 = reportData.schemes.find(s => s.name.includes('A1_'));
  const va = reportData.schemes.find(s => s.name.includes('VersionA_'));
  document.getElementById('kpiBest').textContent = 'mixed_v2 (logprob)';
  document.getElementById('kpiA1').textContent = a1?.local_accuracy ? `${a1.local_accuracy.toFixed(2)}%` : '-';
  document.getElementById('kpiVA').textContent = va?.local_accuracy ? `${va.local_accuracy.toFixed(2)}%` : '-';

  document.getElementById('focusBetter').addEventListener('change', (e) => {
    renderSchemeChart(reportData.schemes, e.target.checked);
  });
}

main();
</script>
</body>
</html>
